<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thank You &mdash; Crowl Digital</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&family=Space+Mono&display=swap" rel="stylesheet">
<style>
*{{box-sizing:border-box;margin:0;padding:0}}
:root{{--y:#FFE600;--black:#0A0A0A;--muted:#6B6B62;--white:#F0F0E8;}}
body{{background:var(--black);color:var(--white);font-family:"DM Sans",sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:2rem}}
.icon{{font-size:3rem;margin-bottom:1.5rem;color:var(--y)}}
h1{{font-family:"Bebas Neue",sans-serif;font-size:4rem;color:var(--y);letter-spacing:0.02em;margin-bottom:1rem}}
p{{color:var(--muted);font-size:1rem;line-height:1.75;max-width:400px;margin-bottom:2.5rem}}
a{{background:var(--y);color:var(--black);padding:0.85rem 2rem;font-size:0.8rem;font-weight:500;letter-spacing:0.12em;text-transform:uppercase;text-decoration:none;font-family:"DM Sans",sans-serif}}
.sub{{font-family:"Space Mono",monospace;font-size:0.6rem;color:var(--muted);letter-spacing:0.15em;text-transform:uppercase;margin-top:3rem}}
</style>
</head>
<body>
  <div class="icon">&#10003;</div>
  <h1>Message Sent.</h1>
  <p>Thanks for reaching out. We&apos;ll get back to you within 24 hours &mdash; no spam, no sales pitch, just a real conversation.</p>
  <a href="/">Back to Crowl Digital</a>
  <div class="sub">crowldigital.com &middot; Bengaluru, India</div>
</body>
</html>
